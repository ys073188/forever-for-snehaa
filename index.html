<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Sneha ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- Stars -->

<div id="stars"></div>

<!-- Hearts -->

<div id="hearts"></div>

<!-- Petals -->

<div id="petals"></div>

<!-- Moon -->

<div class="moon"></div>

<!-- Overlay -->

<div class="overlay"></div>

<!-- =========================
     INTRO
========================= -->

<section id="intro">

<div class="introBox">

<h3>✨ A Special Surprise ✨</h3>

<h1>For Sneha ❤️</h1>

<p>

Someone spent time creating something
just for you...

</p>

<button id="openLetter">

Open The Letter 💌

</button>

</div>

</section>

<!-- =========================
     LETTER
========================= -->

<section id="letter" class="hidden">

<div class="letter">

<div class="paper">

<h2>Dear Sneha ❤️</h2>

<p id="typingText"></p>

<button id="continueBtn">

Continue ❤️

</button>

</div>

</div>

</section>

<!-- =========================
     PROPOSAL
========================= -->

<section id="proposal" class="hidden">

<div class="proposalCard">

<h2>

Will You Be My

</h2>

<h1>

Forever Partner?

❤️

</h1>

<div class="btnArea">

<button id="yes">

YES ❤️

</button>

<button id="no">

NO 🙈

</button>

</div>

</div>

</section>

<!-- =========================
     SUCCESS
========================= -->

<section id="success" class="hidden">

<div class="successCard">

<h1>

🎉 Thank You Sneha ❤️

</h1>

<p>

You just made

my heart smile.

❤️

</p>

</div>

</section>

<canvas id="confetti"></canvas>

<script src="script.js"></script>

</body>

</html>
